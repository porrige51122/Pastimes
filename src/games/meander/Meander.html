<link rel="icon" type="image/png" sizes="32x32" href="../../shared/favicon-32.png" />

<body>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#e7ebf1"/>
    <!-- lattice tracks -->
    <g stroke="#cdd6e2" stroke-width="1.4" stroke-linecap="round">
      <line x1="30" y1="30" x2="70" y2="30"/><line x1="30" y1="50" x2="70" y2="50"/>
      <line x1="30" y1="70" x2="70" y2="70"/>
      <line x1="30" y1="30" x2="30" y2="70"/><line x1="50" y1="30" x2="50" y2="70"/><line x1="70" y1="30" x2="70" y2="70"/>
    </g>
    <!-- river running ON the lattice -->
    <path d="M30,30 H70 V50 H50" stroke="#1d6c8a" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M50,50 V70 H30" stroke="#2f6bff" stroke-width="3.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- IN (green) / OUT (amber) -->
    <circle cx="30" cy="30" r="6.5" fill="#15a05a"/>
    <circle cx="30" cy="70" r="6.5" fill="#f5a623"/>
  </svg>
</template>

<div id="root"></div>

<script src="../../shared/rules.js"></script>
<script src="meander-logic.js"></script>
<script type="text/babel" src="MeanderApp.jsx"></script>
</body>
</html>
